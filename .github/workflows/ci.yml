name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile Python
        run: python -m compileall -q tools scripts tests

      - name: Validate study content
        run: python scripts/check_content.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Smoke test CLI
        run: python -m tools.study_cli domains
